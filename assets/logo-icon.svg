<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 150" role="img" aria-label="Sala Ísis">
  <!-- Center petal -->
  <path d="M 80,6
           C 66,22 60,44 60,60
           C 60,72 68,80 80,84
           C 92,80 100,72 100,60
           C 100,44 94,22 80,6 Z"
        fill="none" stroke="#D4A574" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Circle with R -->
  <circle cx="80" cy="52" r="16" fill="none" stroke="#D4A574" stroke-width="2"/>
  <text x="80" y="60"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="20" font-weight="400"
        fill="#D4A574">R</text>

  <!-- Left inner petal -->
  <path d="M 79,83 C 60,70 42,54 32,36 C 46,50 62,66 79,83 Z"
        fill="none" stroke="#D4A574" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Right inner petal -->
  <path d="M 81,83 C 100,70 118,54 128,36 C 114,50 98,66 81,83 Z"
        fill="none" stroke="#D4A574" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Left outer petal -->
  <path d="M 56,68 C 42,59 27,50 16,36 C 28,48 44,58 56,68 Z"
        fill="none" stroke="#D4A574" stroke-width="2" stroke-linejoin="round"/>

  <!-- Right outer petal -->
  <path d="M 104,68 C 118,59 133,50 144,36 C 132,48 116,58 104,68 Z"
        fill="none" stroke="#D4A574" stroke-width="2" stroke-linejoin="round"/>

  <!-- Lotus base -->
  <path d="M 46,85 C 55,100 68,106 80,106 C 92,106 105,100 114,85"
        fill="none" stroke="#D4A574" stroke-width="2.4" stroke-linecap="round"/>

  <!-- SALA ÍSIS text below icon -->
  <text x="80" y="126"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="11" font-weight="500" letter-spacing="5"
        fill="#D4A574">SALA ÍSIS</text>
</svg>
